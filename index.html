<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{--bg:#f6f8fa;--accent:#0366d6;--text:#0b1220}
        body{font-family:Inter,Segoe UI,Roboto,system-ui,Arial; background:var(--bg); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:2rem}
        p{max-width:60ch; color:var(--text); background:#ffffff; padding:0.9rem 1.1rem; border-radius:8px; box-shadow:0 6px 18px rgba(11,18,32,0.08); line-height:1.6; font-size:1rem; transition:transform .18s ease, box-shadow .18s ease}
        p:hover{transform:translateY(-3px); box-shadow:0 12px 24px rgba(11,18,32,0.12)}
        p a{color:var(--accent); text-decoration:underline}
        @media (max-width:480px){body{padding:1rem} p{font-size:.95rem; padding:.75rem}}
    </style>
</head>
<body>
    <p>Redirecting you to the document... If nothing happens, <a href="https://drive.google.com/file/d/1Q1MMEkg1Ljp5jGQCZs1EJ66pJIN-nR0e/view?usp=sharing">click here</a>.</p>
    <script>
        // Replace the current page with the Drive link so it opens immediately
        window.location.replace("https://drive.google.com/file/d/1Q1MMEkg1Ljp5jGQCZs1EJ66pJIN-nR0e/view?usp=sharing");
    </script>
</body>
</html>
